---
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: "${APP}"
  labels:
    kustomize.toolkit.fluxcd.io/ssa: IfNotPresent
spec:
  copyMethod: Snapshot

  credentialProjection:
    enabled: true

  repository:
    kind: ClusterRepository
    name: ${KOPIUR_REPOSITORY:=hetzner}

  retention:
    keepHourly: ${KOPIUR_KEEP_HOURLY:-8}
    keepDaily: ${KOPIUR_KEEP_DAILY:-7}

  sources:
    - pvc:
        name: "${KOPIUR_PVC:=${APP}}"

  volumeSnapshotClassName: "${KOPIUR_SNAPSHOTCLASS:=csi-ceph-blockpool}"

  mover:
    securityContext:
      runAsUser: "${KOPIUR_UID:=1000}" # the UID that owns the data
      runAsGroup: "${KOPIUR_GID:=1000}" # the GID that owns the data
      runAsNonRoot: "${KOPIUR_RUN_AS_NON_ROOT:=true}" # keep the unprivileged guarantee
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      seccompProfile:
        type: RuntimeDefault
