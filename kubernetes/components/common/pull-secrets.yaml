---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: imp-atcr
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: imp-atcr
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "atcr.io": {
                "username": "{{ .username }}",
                "password": "{{ .password }}",
                "auth": "{{ printf "atcr.io:%s" .password | b64enc }}"
              }
            }
          }
  dataFrom:
    - extract:
        key: svc-atcr
