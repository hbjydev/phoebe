---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
resources:
  - ../base/ks.yaml
patches:
  - target:
      group: kustomize.toolkit.fluxcd.io
      kind: Kustomization
      version: v1
    patch: |-
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: not-used
      spec:
        postBuild:
          substitute:
            OIDC_PUBLIC: "true"
        patches:
          - target:
              group: kaniop.rs
              kind: KanidmOAuth2Client
              version: v1beta1
            patch: |-
              apiVersion: kaniop.rs/v1beta1
              kind: KanidmOAuth2Client
              metadata:
                name: not-used
              spec:
                secretRotation: null
