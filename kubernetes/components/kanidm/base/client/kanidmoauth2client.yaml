---
apiVersion: kaniop.rs/v1beta1
kind: KanidmOAuth2Client
metadata:
  name: ${APP}
spec:
  displayname: ${OIDC_DISPLAY_NAME:-${APP}}

  image:
    url: ${OIDC_IMAGE_URL:-https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/${APP}.svg}

  kanidmRef:
    name: kanidm
    namespace: security

  origin: ${OIDC_ORIGIN}

  redirectUrl: ${OIDC_REDIRECT_URLS:=${emptyArray}}

  scopeMap:
    - group: ${OIDC_USERS_GROUP_NAME}
      scopes:
        - openid
        - profile
        - email
        - groups

  secretRotation:
    enabled: ${OIDC_SECRET_ROTATION_ENABLED}
    periodDays: ${OIDC_SECRET_ROTATION_PERIOD_DAYS}

  secretKeyAliases: ${OIDC_SECRET_KEY_ALIASES:=${emptyDict}}
