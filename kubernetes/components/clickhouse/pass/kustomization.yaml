---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
resources:
  - ./externalsecret.yaml
  - ../base/ks.yaml
patches:
  - target:
      group: kustomize.toolkit.fluxcd.io
      kind: Kustomization
      version: v1
    patch: |-
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: not-used
      spec:
        postBuild:
          substitute:
            DISABLE_PASSWORD: "false"
            APP: "${APP}"

  - target:
      kind: HelmRelease
      group: helm.toolkit.fluxcd.io
      version: v2
    patch: |-
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: not-used
      spec:
        values:
          defaultPodOptions:
            annotations:
              k8s.ksgate.org/clickhouse-ready: |
                {
                  "apiVersion": "clickhouse.com/v1alpha1",
                  "kind": "ClickHouseCluster",
                  "name": "clickhouse",
                  "namespace": "database",
                  "expression": "resource.status.readyReplicas >= 1"
                }
              k8s.ksgate.org/clickhouse-service: |
                {
                  "apiVersion": "v1",
                  "kind": "Service",
                  "name": "clickhouse-clickhouse-headless",
                  "namespace": "database"
                }
            schedulingGates:
              - name: k8s.ksgate.org/clickhouse-ready
              - name: k8s.ksgate.org/clickhouse-service
