---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: odysseus
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      miniflux:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: ghcr.io/hbjydev/odysseus
              tag: 5c390d6@sha256:588049473fe67cb99d09e02303537c55b7f47ef006b5dc8fcecc4bfb990f7b5a
            env:
              TZ: Europe/London
              SEARXNG_INSTANCE: http://searxng.selfhosted:8080
              CHROMADB_HOST: odysseus-chromadb
              CHROMADB_PORT: 8000
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 1024Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        ports:
          http:
            port: &port 7000

    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.hayden.moe"
        parentRefs:
          - name: external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port

    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /app/data
            subPath: data
          - path: /app/logs
            subPath: logs
          - path: /app/.ssh
            subPath: ssh
      cache:
        suffix: cache
        size: 20Gi
        accessMode: ReadWriteOnce
        storageClass: ceph-block
        globalMounts:
          - path: /app/.cache/huggingface
            subPath: huggingface
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
