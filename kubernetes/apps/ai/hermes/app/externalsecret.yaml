---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-config-env
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: hermes-config-env
    template:
      data:
        HERMES_DASHBOARD_OIDC_ISSUER: https://sso.hayden.moe/oauth2/openid/hermes
        HERMES_DASHBOARD_OIDC_CLIENT_ID: hermes

        API_SERVER_ENABLED: 'true'
        API_SERVER_HOST: 0.0.0.0
        API_SERVER_KEY: '{{ .apiServerKey }}'
        API_SERVER_CORS_ORIGINS: '*'

        DISCORD_ALLOWED_USERS: '{{ .discordAllowedUsers }}'
        DISCORD_HOME_CHANNEL: '1515119754602352791'
        DISCORD_HOME_CHANNEL_NAME: '#holly'
        DISCORD_BOT_TOKEN: '{{ .discordBotToken }}'

        LITELLM_API_KEY: '{{ .litellmKey }}'

        HASS_URL: 'https://hass.hayden.moe'
        HASS_TOKEN: '{{ .hassToken }}'

        SEERR_URL: http://jellyseerr.default
        SEERR_API_KEY: '{{ .js_apiKey }}'

        FORGEJO_URL: '{{ .forgejoUrl }}'
        FORGEJO_USERNAME: '{{ .forgejoUsername }}'
        FORGEJO_TOKEN: '{{ .forgejoToken }}'

        SEARXNG_URL: http://searxng.selfhosted:8080
        HONCHO_BASE_URL: http://honcho

        MEMINI_API_KEY: "{{ .memini_apiKey }}"
        MEMINI_URL: http://memini.ai.svc.cluster.local:8080
        MEMINI_NAMESPACE: hermes
  dataFrom:
    - extract:
        key: app-hermes

    - extract:
        key: app-memini
      rewrite:
        - regexp:
            source: "(.*)"
            target: memini_$1

    - extract:
        key: app-jellyseerr
      rewrite:
        - regexp:
            source: "(.*)"
            target: js_$1
