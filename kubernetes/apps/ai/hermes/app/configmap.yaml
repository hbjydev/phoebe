---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config
data:
  config.yaml: |-
    model:
      default: oc-deepseek-v4-flash
      provider: custom:litellm

    security:
      redact_secrets: true

    privacy:
      redact_pii: true

    dashboard:
      theme: default
      show_token_analytics: true
      public_url: https://hermes.hayden.moe

    custom_providers:
      - name: litellm
        key_env: LITELLM_API_KEY
        base_url: http://litellm.ai:4000
        api_mode: chat_completions

    timezone: 'Europe/London'

    terminal:
      backend: local
      cwd: /opt/data/workspace
      timeout: 180
      persistent_shell: true

    toolsets:
      - hermes-cli

    mcp_servers:
      homelab:
        url: http://vmcp-mcp-gateway-int.ai.svc.cluster.local:4483/mcp

    memory:
      memory_enabled: true
      user_profile_enabled: true
      memory_char_limit: 2200
      user_char_limit: 1375
      provider: memini

    approvals:
      mode: ask

    discord:
      require_mention: true
      auto_thread: true
      reactions: true
      allowed_channels: "*"
