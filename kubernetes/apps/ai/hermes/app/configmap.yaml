---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config
data:
  config.yaml: |-
    model:
      default: deepseek-v4-flash
      provider: opencode-go

    dashboard:
      theme: default
      show_token_analytics: true
      public_url: https://hermes.hayden.moe

    fallback_providers:
      - provider: opencode-zen
        model: deepseek-v4-flash

    providers:
      opencode-go:
        api_key: $${OPENCODE_API_KEY}
      opencode-zen:
        api_key: $${OPENCODE_API_KEY}

    timezone: 'Europe/London'

    toolsets:
      - hermes-cli

    memory:
      memory_enabled: true
      user_profile_enabled: true
      memory_char_limit: 2200
      user_char_limit: 1375
      provider: honcho

    approvals:
      mode: ask

    discord:
      require_mention: true
      auto_thread: true
      reactions: true
      free_response_channels: 1515084851848548535,1515119754602352791
      allowed_channels: "*"

    homeassistant:
      url: https://hass.hayden.moe
      token: $${HASS_TOKEN}
