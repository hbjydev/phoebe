---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config
data:
  config.yaml: |-
    model:
      default: deepseek-v4-flash
      provider: opencode-go

    security:
      redact_secrets: true

    privacy:
      redact_pii: true

    dashboard:
      theme: default
      show_token_analytics: true
      public_url: https://hermes.hayden.moe

    fallback_providers:
      - provider: opencode-zen
        model: deepseek-v4-flash

    providers:
      opencode-go:
        api_key: $${OPENCODE_API_KEY}
      opencode-zen:
        api_key: $${OPENCODE_API_KEY}

    timezone: 'Europe/London'

    terminal:
      backend: local
      cwd: /opt/data/workspace
      timeout: 180
      persistent_shell: true

    toolsets:
      - hermes-cli

    mcp_servers:
      homelab:
        url: http://vmcp-mcp-gateway.ai.svc.cluster.local:4483/mcp

    memory:
      memory_enabled: true
      user_profile_enabled: true
      memory_char_limit: 2200
      user_char_limit: 1375
      provider: honcho

    approvals:
      mode: ask

    discord:
      require_mention: true
      auto_thread: true
      reactions: true
      allowed_channels: "*"
