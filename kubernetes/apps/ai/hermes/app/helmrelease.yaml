---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      hermes:
        annotations:
          reloader.stakater.com/auto: "true"

        initContainers:
          copy-config:
            image:
              repository: docker.io/library/alpine
              tag: "3.24"
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                rm -rf /opt/data/config.yaml
                cp /config/config.yaml /opt/data/config.yaml

        containers:
          gateway:
            image: &image
              repository: nousresearch/hermes-agent
              tag: v2026.6.5@sha256:9ad3b04ec916ea2c2da22358fd43b024c788d74073210695af88bfc2e63869b4
            args:
              - gateway
              - run
              - --no-supervise
            env:
              HOME: /opt/data
            envFrom: &envFrom
              - secretRef:
                  name: hermes-config-env
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                cpu: 2000m
                memory: 4Gi
            ports:
              - containerPort: &gatewayPort 8642
                name: http
                protocol: TCP

          dashboard:
            image: *image
            args:
              - gateway
              - run
              - --no-supervise
            envFrom: *envFrom
            resources:
              requests:
                cpu: 500m
              limits:
                memory: 1Gi
            ports:
              - containerPort: &dashboardPort 9119
                name: http
                protocol: TCP

    defaultPodOptions:
      securityContext:
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch

    service:
      gateway:
        type: ClusterIP
        ports:
          http:
            port: *gatewayPort

      dashboard:
        type: ClusterIP
        ports:
          http:
            port: *dashboardPort

    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.hayden.moe"
        parentRefs:
          - name: external
            namespace: network
        rules:
          - backendRefs:
              - identifier: dashboard
                port: http

    persistence:
      data:
        existingClaim: '{{ .Release.Name }}'
        globalMounts:
          - path: /opt/data
      config:
        type: configMap
        name: '{{ .Release.Name }}-config'
        defaultMode: 0755
      tmp:
        type: emptyDir
