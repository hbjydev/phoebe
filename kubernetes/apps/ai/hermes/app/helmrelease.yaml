---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      hermes:
        annotations:
          reloader.stakater.com/auto: "true"

        initContainers:
          copy-config:
            image:
              repository: docker.io/library/alpine
              tag: "3.24"
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                rm -rf /opt/data/config.yaml
                cp /config/config.yaml /opt/data/config.yaml

        containers:
          gateway:
            image: &image
              repository: forgejo.hayden.moe/hayden/containers/hermes
              tag: v2026.6.5-8a6586e@sha256:743f9d8f7c332edd87c1bd51bff03ed43e7ee918ecef951cd1519147ef4c53bd
            args:
              - gateway
              - run
              - --no-supervise
            env:
              HOME: /opt/data
            envFrom: &envFrom
              - secretRef:
                  name: hermes-config-env
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                cpu: 2000m
                memory: 4Gi
            ports:
              - containerPort: &gatewayPort 8642
                name: http
                protocol: TCP

          dashboard:
            image: *image
            args:
              - dashboard
              - --host
              - '0.0.0.0'
            env:
              TZ: Europe/London
              GATEWAY_HEALTH_URL: http://localhost:8642
            envFrom: *envFrom
            resources:
              requests:
                cpu: 500m
              limits:
                memory: 1Gi
            ports:
              - containerPort: &dashboardPort 9119
                name: http
                protocol: TCP

    defaultPodOptions:
      imagePullSecrets:
        - name: imp-forgejo
      securityContext:
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch

    service:
      gateway:
        type: ClusterIP
        ports:
          http:
            port: *gatewayPort

      dashboard:
        type: ClusterIP
        ports:
          http:
            port: *dashboardPort

    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.hayden.moe"
        parentRefs:
          - name: external
            namespace: network
        rules:
          - backendRefs:
              - identifier: dashboard
                port: http

    persistence:
      data:
        existingClaim: '{{ .Release.Name }}'
        globalMounts:
          - path: /opt/data
      config:
        type: configMap
        name: '{{ .Release.Name }}-config'
        defaultMode: 0755
      tmp:
        type: emptyDir

    serviceAccount:
      hermes: {}

    rbac:
      roles:
        # Broad read-only access across cluster resources. Secrets intentionally excluded.
        hermes-read-all:
          type: ClusterRole
          rules:
            - apiGroups: [""]
              resources: ["pods", "pods/log", "nodes", "services", "namespaces", "configmaps",
                "persistentvolumes", "persistentvolumeclaims", "endpoints", "resourcequotas",
                "limitranges", "serviceaccounts", "events"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["apps"]
              resources: ["deployments", "daemonsets", "statefulsets", "replicasets",
                "controllerrevisions"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["batch"]
              resources: ["jobs", "cronjobs"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["networking.k8s.io"]
              resources: ["ingresses", "ingressclasses", "networkpolicies"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["storage.k8s.io"]
              resources: ["storageclasses", "csinodes", "csidrivers", "volumeattachments"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["autoscaling"]
              resources: ["horizontalpodautoscalers"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["policy"]
              resources: ["poddisruptionbudgets"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["coordination.k8s.io"]
              resources: ["leases"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["rbac.authorization.k8s.io"]
              resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["apiextensions.k8s.io"]
              resources: ["customresourcedefinitions"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["apiregistration.k8s.io"]
              resources: ["apiservices"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["metrics.k8s.io"]
              resources: ["nodes", "pods"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["helm.toolkit.fluxcd.io"]
              resources: ["helmreleases"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["kustomize.toolkit.fluxcd.io"]
              resources: ["kustomizations"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["source.toolkit.fluxcd.io"]
              resources: ["gitrepositories", "helmrepositories", "ocirepositories",
                "buckets", "helmcharts"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["external-secrets.io"]
              resources: ["externalsecrets", "secretstores", "clustersecretstores"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["monitoring.coreos.com"]
              resources: ["prometheuses", "alertmanagers", "servicemonitors", "podmonitors",
                "prometheusrules", "thanosrulers", "probes"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["grafana.integreatly.org"]
              resources: ["grafanas", "grafanacontactpoints", "grafanaalertrulegroups",
                "grafanadashboards", "grafanadatasources", "grafanafolders",
                "grafanalibrarypanels", "grafanamanifests", "grafanamutetimings",
                "grafananotificationpolicies", "grafananotificationpolicyroutes",
                "grafananotificationtemplates", "grafanaserviceaccounts"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["snapshot.storage.k8s.io"]
              resources: ["volumesnapshots", "volumesnapshotcontents", "volumesnapshotclasses"]
              verbs: ["get", "list", "watch"]
      bindings:
        hermes-read-all:
          type: ClusterRoleBinding
          roleRef:
            identifier: hermes-read-all
          subjects:
            - identifier: hermes
              serviceAccount: hermes
