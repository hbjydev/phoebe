---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-mcp
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: grafana-mcp-secret
    template:
      data:
        GRAFANA_SERVICE_ACCOUNT_TOKEN: '{{ .token }}'
  dataFrom:
    - extract:
        key: app-grafana-mcp
