---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: honcho
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    configMaps:
      config:
        suffix: config
        data:
          TZ: Europe/London

          EMBEDDING_MODEL_CONFIG__MODEL: 'or-text-embedding-3-small'
          EMBEDDING_MODEL_CONFIG__OVERRIDES__BASE_URL: http://litellm.ai:4000

          DERIVER_MODEL_CONFIG__MODEL: 'oc-deepseek-v4-flash'
          DERIVER_MODEL_CONFIG__OVERRIDES__BASE_URL: http://litellm.ai:4000

          DIALECTIC_LEVELS__minimal__MODEL_CONFIG__MODEL: oc-deepseek-v4-flash
          DIALECTIC_LEVELS__low__MODEL_CONFIG__MODEL: oc-deepseek-v4-flash
          DIALECTIC_LEVELS__medium__MODEL_CONFIG__MODEL: oc-deepseek-v4-flash
          DIALECTIC_LEVELS__high__MODEL_CONFIG__MODEL: oc-deepseek-v4-pro
          DIALECTIC_LEVELS__max__MODEL_CONFIG__MODEL: oc-deepseek-v4-pro

          CACHE_URL: redis://{{ .Release.Name }}-redis:6379/0?suppress=true
          CACHE_ENABLED: 'true'

          METRICS_ENABLED: 'true'
          METRICS_NAMESPACE: honcho

          CORS_ORIGINS: '["http://honcho", "http://honcho.ai", "https://honcho.hayden.moe"]'

    controllers:
      honcho:
        annotations:
          reloader.stakater.com/auto: "true"

        initContainers:
          migrate:
            image: &image
              repository: ghcr.io/plastic-labs/honcho
              tag: v3.0.9@sha256:32a831e303fa4053bf82af3b65cea019b80a7b491cfcdef3b5cb81c8cef635bf
            command:
              - /bin/sh
              - -c
              - alembic upgrade head
            envFrom:
              - configMapRef:
                  identifier: config
              - secretRef:
                  name: honcho-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}

        containers:
          app:
            image: *image
            envFrom:
              - configMapRef:
                  identifier: config
              - secretRef:
                  name: honcho-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8000
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                memory: 2Gi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        type: ClusterIP
        ports:
          http:
            port: *port

    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 401"]
        hostnames:
          - "{{ .Release.Name }}.hayden.moe"
        parentRefs:
          - name: internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *port

    persistence:
      tmp:
        type: emptyDir
