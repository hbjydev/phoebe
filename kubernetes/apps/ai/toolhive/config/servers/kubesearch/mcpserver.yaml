---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/toolhive.stacklok.dev/mcpserver_v1beta1.json
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: kubesearch
spec:
  image: ghcr.io/perfectra1n/kubesearch-mcp:master
  transport: streamable-http
  mcpPort: &port 3000
  groupRef:
    name: mcp-tools
  env:
    - name: KUBESEARCH_REFRESH_HOURS
      value: "24"
  podTemplateSpec:
    spec:
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: mcp
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          ports:
            - name: mcp
              containerPort: *port
          startupProbe:
            httpGet:
              path: /healthz
              port: *port
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: *port
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests: &requests
              cpu: 10m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
  resources:
    requests: *requests
    limits:
      cpu: 200m
      memory: 256Mi
