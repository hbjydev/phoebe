---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServerEntry
metadata:
  name: mcps-context7
  namespace: ai
spec:
  remoteUrl: https://mcp.context7.com/mcp
  transport: streamable-http
  groupRef:
    name: mcp-tools
  headerForward:
    addHeadersFromSecret:
      - headerName: CONTEXT7_API_KEY
        valueSecretRef:
          name: toolhive-servers
          key: CONTEXT7_API_KEY
