---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: toolhive-servers
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: toolhive-servers
    template:
      data:
        GRAFANA_SERVICE_ACCOUNT_TOKEN: '{{ .grafanaToken }}'
        CONTEXT7_API_KEY: '{{ .context7Token }}'
  dataFrom:
    - extract:
        key: app-toolhive
