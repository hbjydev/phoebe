---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: toolhive-servers
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: toolhive-servers
    template:
      data:
        GRAFANA_SERVICE_ACCOUNT_TOKEN: '{{ .grafanaToken }}'
        CONTEXT7_API_KEY: '{{ .context7Token }}'
        FORGEJO_TOKEN: '{{ .hermes_forgejoToken }}'
  dataFrom:
    - extract:
        key: app-toolhive
    - extract:
        key: app-hermes
      rewrite:
        - regexp:
            source: "(.*)"
            target: hermes_$1
