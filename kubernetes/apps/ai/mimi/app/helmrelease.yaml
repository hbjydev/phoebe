---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mimi
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      mimi:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        strategy: Recreate
        type: deployment

        initContainers:
          init:
            image:
              repository: docker.io/library/alpine
              tag: "3.24"
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                rm -rf /data/config.yaml*
                cp /run/config/config.yaml /data/config.yaml
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: [ALL] }
              runAsGroup: 1000
              runAsUser: 1000

        containers:
          app:
            image: &image
              repository: forgejo.hayden.moe/hayden/containers/hermes
              tag: v2026.7.7-062cb81@sha256:a8e73062761739bfc38b551a75574f0ad8660ba8aa6ec1f163dd9155f64d75e3
            env: &env
              TZ: Europe/London

              API_SERVER_ENABLED: "true"
              API_SERVER_HOST: "0.0.0.0"
              API_SERVER_CORS_ORIGINS: '*'

              HERMES_UID: "1000"
              HERMES_GID: "1000"
              HERMES_HOME: "/data"
              HERMES_CRON_TIMEOUT: 0

              HERMES_DASHBOARD: "1"
              HERMES_DASHBOARD_OIDC_ISSUER: https://sso.hayden.moe/oauth2/openid/mimi
              HERMES_DASHBOARD_OIDC_CLIENT_ID: mimi

              MEMINI_URL: http://memini.ai.svc.cluster.local:8080
              MEMINI_NAMESPACE: mimi

              DISCORD_ALLOW_ALL_USERS: true

              HOME: /data
            envFrom: &envFrom
              - secretRef:
                  name: mimi-config-env
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                cpu: 2000m
                memory: 4Gi
            ports:
              - containerPort: &gatewayPort 8642
                name: gateway
                protocol: TCP
            securityContext: &secCtx
              allowPrivilegeEscalation: false
              capabilities:
                add:
                  - CHOWN
                  - DAC_OVERRIDE
                  - FOWNER
                  - FSETID
                  - SETGID
                  - SETUID
                drop:
                  - ALL
              readOnlyRootFilesystem: true

          dashboard:
            image: *image
            env: *env
            envFrom: *envFrom
            command:
              - hermes
              - dashboard
              - --host=0.0.0.0
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                cpu: 1000m
                memory: 1Gi
            ports:
              - containerPort: &dashboardPort 9119
                name: dashboard
                protocol: TCP
            securityContext: *secCtx

    defaultPodOptions:
      imagePullSecrets:
        - name: imp-forgejo
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsUser: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

    service:
      app:
        controller: mimi
        ipFamilies:
          - IPv4
        ports:
          gateway:
            port: *gatewayPort
          dashboard:
            port: *dashboardPort

    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.hayden.moe"
        parentRefs:
          - name: external
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: dashboard

    persistence:
      data:
        existingClaim: '{{ .Release.Name }}'

      config:
        type: configMap
        name: 'mimi-config'
        defaultMode: 0o755
        advancedMounts:
          mimi:
            init:
              - path: /run/config/config.yaml
                subPath: config.yaml

      run:
        type: emptyDir
        advancedMounts:
          mimi:
            app:
              - path: /run

      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
