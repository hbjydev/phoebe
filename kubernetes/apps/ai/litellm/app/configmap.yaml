---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
data:
  config.yaml: |-
    litellm_settings:
      callbacks: ['prometheus']
      service_callback: ['prometheus_system']
      cache: true
      cache_params:
        type: redis
        host: litellm-redis
        port: 6379
        namespace: litellm
      drop_params: true

    model_list:
      - model_name: oc-qwen-3.6
        litellm_params:
          model: openai/qwen-3.6-plus
          api_base: https://opencode.ai/zen/go/v1
          api_key: os.environ/OPENCODE_API_KEY

      - model_name: oc-deepseek-v4-flash
        litellm_params:
          model: openai/deepseek-v4-flash
          api_base: https://opencode.ai/zen/go/v1
          api_key: os.environ/OPENCODE_API_KEY

      - model_name: oc-deepseek-v4-pro
        litellm_params:
          model: openai/deepseek-v4-pro
          api_base: https://opencode.ai/zen/go/v1
          api_key: os.environ/OPENCODE_API_KEY

      - model_name: or-text-embedding-3-small
        litellm_params:
          model: openrouter/openai/text-embedding-3-small
          api_base: https://openrouter.ai/api/v1
          api_key: os.environ/OPENROUTER_API_KEY

      - model_name: or-deepseek-v4-flash
        litellm_params:
          model: openrouter/deepseek/deepseek-v4-flash
          api_base: https://openrouter.ai/api/v1
          api_key: os.environ/OPENROUTER_API_KEY
