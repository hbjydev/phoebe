---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: memini
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: memini
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    global:
      fullnameOverride: memini

    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
        containers:
          main:
            env:
              MEMINI_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: memini-secret
                    key: MEMINI_API_KEY
              MEMINI_BACKEND: postgres
              MEMINI_POSTGRES_DSN:
                valueFrom:
                  secretKeyRef:
                    name: memini-postgres
                    key: url
              MEMINI_DEFAULT_NAMESPACE: default
              MEMINI_DEMOTE_AFTER: 1440h
              MEMINI_TOMBSTONE_TTL: 720h
              MEMINI_LOG_FORMAT: json
              MEMINI_EMBED_BASE_URL: http://text-embeddings-inference.ai.svc.cluster.local:8080/v1
              MEMINI_EMBED_DIMS: '384'
              MEMINI_EMBED_MODEL: all-MiniLM-L6-v2
              MEMINI_RERANK: http://llama-cpp-reranker.ai.svc.cluster.local:8080/v1
              MEMINI_RERANK_MODEL: qwen3-reranker-0.6b
              MEMINI_RERANK_TOP_N: '20'
              MEMINI_RERANK_MAX_DOC_CHARS: '4000'
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: [ALL] }

    persistence:
      data:
        existingClaim: memini

    serviceMonitor:
      main:
        enabled: true

    grafanaDashboards:
      enabled: true

    route:
      main:
        enabled: true
        parentRefs:
          - name: external
            namespace: network
            sectionName: https
        hostnames:
          - memini.hayden.moe

      ui:
        enabled: true
        annotations:
          gatus.home-operations.com/enabled: 'false'
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        hostnames:
          - memini.hayden.moe
