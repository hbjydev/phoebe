---
apiVersion: kaniop.rs/v1beta1
kind: Kanidm
metadata:
  name: kanidm
spec:
  domain: sso.hayden.moe
  ldapPortName: ldaps
  image: kanidm/server:1.10.4
  disableUpgradeChecks: true

  domainAppearance:
    displayName: Hayden's SSO
    image:
      url: https://cdn.bsky.app/img/avatar/plain/did:plc:puvaym5ytsvejx3rwjrnxhvb/bafkreig74yrxbvhrrgctb4qj6ojeotvgrcilcr6h7ptlcg3t4kd2ex4djq

  replicaGroups:
    - name: default
      replicas: 1
      primaryNode: true
      statefulSetAnnotations:
        reloader.stakater.com/auto: "true"
      resources:
        requests:
          cpu: 100m
          memory: 140Mi
        limits:
          memory: 200Mi

  storage:
    volumeClaimTemplate:
      spec:
        storageClassName: ceph-block
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 100Mi

  # Selectors
  oauth2ClientNamespaceSelector:
    matchLabels: {}
  groupNamespaceSelector:
    matchLabels: {}
  personNamespaceSelector:
    matchLabels: {}
  serviceAccountNamespaceSelector:
    matchLabels: {}
