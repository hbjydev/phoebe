---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kubevirt
components:
  - ../../components/common
resources:
  # renovate: datasource=github-releases depName=kubevirt/kubevirt
  - https://github.com/kubevirt/kubevirt/releases/download/v1.8.2/kubevirt-operator.yaml
  - ./kubevirt.yaml
patches:
  - patch: |
      apiVersion: v1
      kind: Namespace
      metadata:
        name: kubevirt
      $patch: delete
