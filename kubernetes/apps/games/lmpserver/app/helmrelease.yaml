---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lmpserver
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      lmpserver:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/lunamultiplayer/lunamultiplayer/server
              tag: master@sha256:3c0933c1ad992fed2d981fb377625319800a1fae651dad4bdb195a37672c0bc3
            env:
              TZ: Europe/London
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &port 8900
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        type: LoadBalancer
        loadBalancerClass: tailscale
        ports:
          udp:
            port: 8800
            protocol: UDP
          tcp:
            port: *port
            protocol: TCP

    persistence:
      media:
        type: nfs
        server: ds.hayden.moe
        path: /volume1/media
        globalMounts:
          - path: /LMPServer/Config
            subPath: ksp-mp/config
          - path: /LMPServer/Plugins
            subPath: ksp-mp/plugins
          - path: /LMPServer/Universe
            subPath: ksp-mp/universe
      logs:
        type: emptyDir
        globalMounts:
          - path: /LMPServer/logs
      tmp:
        type: emptyDir
