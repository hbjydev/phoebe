---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kopiur
spec:
  chartRef:
    kind: OCIRepository
    name: kopiur
  interval: 30m

  postRenderers:
    - kustomize:
        patches:
          - target:
              group: grafana.integreatly.org
              version: v1beta1
              kind: GrafanaDashboard
              name: kopiur-dashboard
            patch: |
              apiVersion: grafana.integreatly.org/v1beta1
              kind: GrafanaDashboard
              metadata:
                name: _
              spec:
                datasources:
                  - datasourceName: VictoriaMetrics
                    inputName: datasource

  values:
    installScope: cluster
    installCRDs: false

    webhook:
      tls:
        mode: cert-manager
      serviceMonitor:
        enabled: true

    features:
      credentialProjection:
        enabled: true

    monitoring:
      serviceMonitor:
        enabled: true
      prometheusRule:
        enabled: true
      dashboards:
        enabled: true
        grafanaOperator:
          enabled: true
          matchLabels:
            grafana.internal/instance: grafana

    podSecurityContext:
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
      runAsGroup: 1000
      runAsNonRoot: true
      runAsUser: 1000
      seccompProfile:
        type: RuntimeDefault

    logging:
      level: info
      format: json
