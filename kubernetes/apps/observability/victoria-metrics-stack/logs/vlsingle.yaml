---
apiVersion: operator.victoriametrics.com/v1
kind: VLSingle
metadata:
  name: victoria-logs
spec:
  image:
    repository: victoriametrics/victoria-logs
    tag: v1.51.0
    pullPolicy: Always

  resources:
    requests:
      memory: "64Mi"
      cpu: "250m"
    limits:
      memory: "128Mi"
      cpu: "500m"

  retentionPeriod: "12"

  storage:
    storageClassName: ceph-block
    resources:
      requests:
        storage: 50Gi
