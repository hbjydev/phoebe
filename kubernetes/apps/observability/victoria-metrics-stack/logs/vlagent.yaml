---
apiVersion: operator.victoriametrics.com/v1
kind: VLAgent
metadata:
  name: logs-agent
spec:
  k8sCollector:
    enabled: true

  resources:
    requests:
      memory: "64Mi"
      cpu: "250m"
    limits:
      memory: "128Mi"
      cpu: "500m"

  storage:
    volumeClaimTemplate:
      storageClass: ceph-block
      resources:
        requests:
          storage: 20Gi
