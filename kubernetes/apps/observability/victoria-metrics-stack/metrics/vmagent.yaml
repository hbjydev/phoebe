---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMAgent
metadata:
  name: metrics-agent
spec:
  selectAllByDefault: true
  replicaCount: 1
  scrapeInterval: 30s
  scrapeTimeout: 10s
  externalLabels:
    cluster: phoebe

  remoteWrite:
    - url: "http://vmsingle-victoria-metrics.observability.svc:8428/api/v1/write"

  resources:
    requests:
      memory: "64Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
