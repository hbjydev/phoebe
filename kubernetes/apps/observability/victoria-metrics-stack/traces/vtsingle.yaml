---
apiVersion: operator.victoriametrics.com/v1
kind: VTSingle
metadata:
  name: victoria-traces
spec:
  image:
    repository: victoriametrics/victoria-traces
    tag: v0.9.4
    pullPolicy: Always

  resources:
    requests:
      memory: "64Mi"
      cpu: "250m"
    limits:
      memory: "128Mi"
      cpu: "500m"

  retentionPeriod: "12"

  storage:
    storageClassName: ceph-block
    resources:
      requests:
        storage: 50Gi
