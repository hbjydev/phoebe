---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
spec:
  chartRef:
    kind: OCIRepository
    name: nextcloud
  interval: 30m
  values:
    cronjob:
      enabled: true
      type: cronjob
      cronjob:
        successfulJobsHistoryLimit: 1
        securityContext:
          runAsGroup: 1022
          runAsNonRoot: true
          runAsUser: 1022
    image:
      flavor: fpm
    nginx:
      enabled: true
    nextcloud:
      datadir: /var/www/data
      existingSecret:
        enabled: true
        secretName: nextcloud-secret
        usernameKey: nextcloud-username
        passwordKey: nextcloud-password
      host: &host drive.hayden.moe
      mail:
        enabled: false
      extraInitContainers:
        - name: create-redis-session-ini
          image: busybox:1.37-uclibc
          command:
            - sh
            - -c
            - touch /mnt/redis-session.ini
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: php-confd
              mountPath: /mnt
      extraVolumeMounts:
        - name: php-confd
          mountPath: /usr/local/etc/php/conf.d/redis-session.ini
          subPath: redis-session.ini
      extraVolumes:
        - name: php-confd
          emptyDir: {}
      podSecurityContext:
        fsGroup: 33
        runAsGroup: 33
        runAsNonRoot: true
        runAsUser: 33
      configs:
        proxy.config.php: |-
          <?php
          $CONFIG = array(
            'check_data_directory_permissions' => false,
            'forwarded_for_headers' => array('HTTP_X_FORWARDED_FOR'),
            'mail_smtpmode' => 'null',
            'skeletondirectory' => '',
            'allow_local_remote_servers' => true,
            'trusted_proxies' => array(
              0 => '127.0.0.1',
              1 => '10.244.0.0/16',
            ),
          ); ?>
        misc.config.php: |-
          <?php
          $CONFIG = array(
            'default_phone_region' => 'GB',
            'maintenance_window_start' => 2,
          ); ?>
    httpRoute:
      enabled: true
      hostnames:
        - *host
      parentRefs:
        - name: internal
          namespace: network
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: "/"
          filters:
            - type: ResponseHeaderModifier
              responseHeaderModifier:
                add:
                  - name: strict-transport-security
                    value: max-age=31536000
    persistence:
      enabled: true
      existingClaim: nextcloud
    redis:
      enabled: true
      architecture: standalone
