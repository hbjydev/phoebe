---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tranquil
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      tandoor:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: atcr.io/tranquil.farm/tranquil-pds
              tag: 0.5.5@sha256:1aa52ce3d4e3145c008adee3b17b34400641ff0e88dce634765ceb7969586b3f
            env:
              TZ: Europe/London
              PDS_HOSTNAME: at.hayden.moe
              SERVER_HOST: 0.0.0.0
              SERVER_PORT: &port 3000
              PDS_AGE_ASSURANCE_OVERRIDE: true
              INVITE_CODE_REQUIRED: true
              MAIL_FROM_ADDRESS: pds@hayden.moe
              MAIL_FROM_NAME: Hayden's PDS
              DATABASE_URL:
                secretKeyRef:
                  name: tranquil-pg-app
                  key: uri
              CRAWLERS: https://bsky.network,https://relay.upcloud.world
            envFrom:
              - secretRef:
                  name: tranquil-secret
            securityContext:
              allowPrivilegeEscalation: true
              readOnlyRootFilesystem: false
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /xrpc/_health
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 1024Mi
    defaultPodOptions:
      imagePullSecrets:
        - name: atcr-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    serviceMonitor:
      app:
        enabled: true
        endpoints:
          - port: http
            scheme: http
            path: /metrics
            interval: 1m

    service:
      app:
        ports:
          http:
            port: *port

    route:
      app:
        hostnames:
          - at.hayden.moe
          - '*.at.hayden.moe'
        parentRefs:
          - name: external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port

    configMaps:
      msmtprc:
        enabled: true
        data:
          msmtprc: |
            defaults

            account relay
            host smtp-relay
            from pds@hayden.moe

            account default: relay

    persistence:
      msmtprc:
        type: configMap
        name: '{{ .Release.Name }}'
        globalMounts:
          - path: /etc/msmtprc
            subPath: msmtprc

      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
