---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo-runner
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  values:
    defaultPodOptions:
      automountServiceAccountToken: true
    configMaps:
      config:
        suffix: config
        data:
          runner.yaml: |-
            cache:
              enabled: true
              dir: /data/cache
            container:
              docker_host: "-"
              workdir_parent: shared/workdir
            host:
              workdir_parent: /data/act
            kubernetes:
              namespace: selfhosted
              poll_timeout: 10m
            log:
              level: info
            plugins:
              k8s:
                address: "unix:///plugin/forgejo-runner-k8s.sock"
                options:
                  namespace: selfhosted
                  poll_timeout: 10m
            runner:
              capacity: 2
              labels:
                - ubuntu-latest:k8s:/config/podspec-default.yaml
                - default:k8s:/config/podspec-default.yaml
                - dind:k8s:/config/podspec-dind.yaml
              timeout: 3h

          podspec-default.yaml: |-
            containers:
              - env:
                  - name: DEBIAN_FRONTEND
                    value: noninteractive
                image: ghcr.io/bjw-s-labs/forgejo-runner:ubuntu-24.04@sha256:4288050ddd71ac2e5f42465c474aec8b838792dec85bb284405db7c180138580
                imagePullPolicy: IfNotPresent
                name: main
                resources:
                  limits:
                    memory: 4Gi
                  requests:
                    cpu: 100m
                    memory: 256Mi
            restartPolicy: Never

          podspec-dind.yaml: |-
            initContainers:
              - name: dind
                image: docker:29-dind
                securityContext:
                  privileged: true
                restartPolicy: Always
                env:
                  - name: DOCKER_TLS_CERTDIR
                    value: /certs
                resources:
                  requests:
                    cpu: 100m
                    memory: 256Mi
                  limits:
                    memory: 4Gi
                volumeMounts:
                  - name: docker-storage
                    mountPath: /var/lib/docker
                  - name: docker-certs
                    mountPath: /certs
                readinessProbe:
                  exec:
                    command:
                      - sh
                      - -c
                      - test -f /certs/client/ca.pem && test -f /certs/client/cert.pem && test -f /certs/client/key.pem
                  initialDelaySeconds: 2
                  periodSeconds: 1
            containers:
              - env:
                  - name: DEBIAN_FRONTEND
                    value: noninteractive
                  - name: DOCKER_HOST
                    value: tcp://localhost:2376
                  - name: DOCKER_TLS_VERIFY
                    value: "1"
                  - name: DOCKER_CERT_PATH
                    value: /certs/client
                image: ghcr.io/bjw-s-labs/forgejo-runner:ubuntu-24.04@sha256:4288050ddd71ac2e5f42465c474aec8b838792dec85bb284405db7c180138580
                imagePullPolicy: IfNotPresent
                name: main
                resources:
                  limits:
                    memory: 4Gi
                  requests:
                    cpu: 100m
                    memory: 256Mi
                volumeMounts:
                  - name: docker-certs
                    mountPath: /certs
                    readOnly: true
            volumes:
              - name: docker-storage
                emptyDir: {}
              - name: docker-certs
                emptyDir: {}
            restartPolicy: Never

    controllers:
      forgejo-runner:
        type: deployment
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          labels:
            app.kubernetes.io/component: forgejo-runner
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
        containers:
          runner:
            image:
              repository: git.erwanleboucher.dev/eleboucher/runner
              # renovate: datasource=git-tags depName=https://git.erwanleboucher.dev/eleboucher/runner.git
              tag: 12.10.1
            command:
              - sh
              - -ec
              - |
                exec /bin/forgejo-runner daemon \
                  --config /config/runner.yaml \
                  --url "http://forgejo-http:3000" \
                  --uuid "$(cat /etc/forgejo-runner-secret/uuid)" \
                  --token-url file:///etc/forgejo-runner-secret/token
            resources:
              requests:
                cpu: 5m
                memory: 256Mi
              limits:
                memory: 1024Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
          k8s-plugin:
            image:
              repository: git.erwanleboucher.dev/eleboucher/runner-k8s-plugin
              # renovate: datasource=git-tags depName=https://git.erwanleboucher.dev/eleboucher/runner-k8s-plugin.git
              tag: 12.10.0
            args:
              - --listen
              - unix:///plugin/forgejo-runner-k8s.sock
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

    serviceAccount:
      forgejo-runner: {}

    rbac:
      roles:
        forgejo-runner:
          type: Role
          rules:
            - apiGroups:
                - ""
              resources:
                - pods
              verbs:
                - list
                - watch
                - create
                - get
                - delete
            - apiGroups:
                - ""
              resources:
                - pods/exec
              verbs:
                - create
                - get
            - apiGroups:
                - ""
              resources:
                - pods/log
              verbs:
                - list
                - watch
                - get

      bindings:
        forgejo-runner:
          type: RoleBinding
          roleRef:
            identifier: forgejo-runner
          subjects:
            - identifier: forgejo-runner

    persistence:
      config:
        type: configMap
        identifier: config
        globalMounts:
          - path: /config
      runner-secret:
        type: secret
        name: forgejo-runner-secret
        globalMounts:
          - path: /etc/forgejo-runner-secret
            readOnly: true
      plugins:
        type: emptyDir
        globalMounts:
          - path: /plugin
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /data
            subPath: data
          - path: /tmp
            subPath: tmp
