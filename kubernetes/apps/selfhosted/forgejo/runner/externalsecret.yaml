---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-runner
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: forgejo-runner-secret
    template:
      data:
        uuid: "{{ .uuid }}"
        token: "{{ .token }}"
  dataFrom:
    - extract:
        key: app-forgejo-runner
