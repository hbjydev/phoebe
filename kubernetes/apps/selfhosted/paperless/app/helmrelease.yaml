---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      paperless:
        containers:
          app:
            image:
              repository: ghcr.io/paperless-ngx/paperless-ngx
              tag: 2.20.10
            env:
              PAPERLESS_URL: https://paperless.hayden.moe
              PAPERLESS_PORT: &port 8000
              PAPERLESS_TIME_ZONE: Europe/London
              PAPERLESS_WEBSERVER_WORKERS: "2"
              PAPERLESS_TASK_WORKERS: "2"

              # Redis Config
              PAPERLESS_REDIS: "redis://paperless-redis:6379"

              # Folders
              PAPERLESS_DATA_DIR: /mnt/paperless/data
              PAPERLESS_MEDIA_ROOT: /mnt/paperless/media
              PAPERLESS_CONSUMPTION_DIR: /mnt/paperless/incoming
              PAPERLESS_EXPORT_DIR: /mnt/paperless/export

              # Configure folder importer
              PAPERLESS_CONSUMER_POLLING: "60"
              PAPERLESS_CONSUMER_RECURSIVE: "true"
              PAPERLESS_CONSUMER_SUBDIRS_AS_TAGS: "true"

              # Configure OCR
              PAPERLESS_TIKA_ENABLED: '1'
              PAPERLESS_TIKA_GOTENBERG_ENDPOINT: 'http://localhost:3000'
              PAPERLESS_TIKA_ENDPOINT: 'http://localhost:9998'
              PAPERLESS_OCR_LANGUAGE: "eng"

              # Configure SSO
              PAPERLESS_ENABLE_ALLAUTH: "true"
              PAPERLESS_APPS: allauth.socialaccount.providers.openid_connect
              PAPERLESS_AUTO_LOGIN: "true"
              PAPERLESS_AUTO_CREATE: "true"

              # Configure SMTP
              PAPERLESS_EMAIL_HOST: smtp-relay
              PAPERLESS_EMAIL_FROM: docs@hayden.moe

              # Permissions
              USERMAP_UID: 1000
              USERMAP_GID: 1000
            envFrom:
              - secretRef:
                  name: paperless-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 2Gi

          gotenberg:
            image:
              repository: gotenberg/gotenberg
              tag: 8.32.0@sha256:a40c5a46b79d812ce2f5e139278163142a054050bfd1e5f162da36d3d11c7138
            command:
              - gotenberg
              - --chromium-disable-javascript=true
              - --chromium-allow-list=file:///tmp/.*
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 2Gi

          tika:
            image:
              repository: apache/tika
              tag: 3.3.0.0-full@sha256:ecdd37e204308266b1f8e28569f8516ebd5b96d7a4518a71d3904710b20c03b3
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 2Gi

    service:
      app:
        controller: paperless
        ports:
          http:
            port: *port

    route:
      app:
        hostnames: ["{{ .Release.Name }}.hayden.moe"]
        parentRefs:
          - name: external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port

    persistence:
      mnt:
        type: nfs
        server: ds.hayden.moe
        path: /volume1/media
      tmp:
        type: emptyDir
