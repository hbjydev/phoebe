---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: navidrome
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: navidrome-secret
    template:
      data:
        ND_LASTFM_APIKEY: '{{ .lastfmApiKey }}'
        ND_LASTFM_SECRET: '{{ .lastfmSecret }}'
  dataFrom:
    - extract:
        key: app-navidrome
