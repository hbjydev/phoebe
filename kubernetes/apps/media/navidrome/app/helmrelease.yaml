---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: navidrome
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  values:
    controllers:
      navidrome:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/navidrome/navidrome
              tag: 0.63.1
            env:
              ND_ENABLEINSIGHTSCOLLECTOR: "false"
              ND_DATAFOLDER: /config
              ND_ENABLEDOWNLOADS: "true"
              ND_LOGLEVEL: info
              ND_MUSICFOLDER: /media/music
              ND_PORT: &port 4533
              ND_SCANSCHEDULE: 30m
              ND_PROMETHEUS_ENABLED: "true"
              ND_REVERSEPROXYWHITELIST: 172.18.0.0/16,10.80.0.0/24
              ND_PLUGINS_FOLDER: /config/plugins
              ND_BASEURL: https://navidrome.hayden.moe
            envFrom:
              - secretRef:
                  name: navidrome-secret
            resources:
              requests:
                cpu: 50m
                memory: 1Gi
              limits:
                memory: 3Gi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        ports:
          http:
            port: *port

    route:
      app:
        hostnames:
          - navidrome.hayden.moe
        parentRefs:
          - name: external
            namespace: network

    persistence:
      config:
        existingClaim: navidrome
        globalMounts:
          - path: /config
      plugins:
        type: nfs
        globalMounts:
          - path: /config/plugins
        server: ds.hayden.moe
        path: /volume1/media/apps/navidrome/plugins
      media:
        type: nfs
        server: ds.hayden.moe
        path: /volume1/media
        globalMounts:
          - path: /media/music
            subPath: music
