---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dispatcharr
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: dispatcharr
  components:
    - ../../../../components/kopiur
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: ./kubernetes/apps/media/dispatcharr/app
  postBuild:
    substitute:
      APP: dispatcharr
      KOPIUR_CAPACITY: 32Gi
      KOPIUR_UID: "0"
      KOPIUR_GID: "0"
      KOPIUR_PRIVILEGED_MODE: "true"
      KOPIUR_RUN_AS_NON_ROOT: "false"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  timeout: 5m
