---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: towonel
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: towonel-agent-secret
    template:
      data:
        TOWONEL_INVITE_TOKEN: "{{ .password }}"
  dataFrom:
    - extract:
        key: svc-towonel
