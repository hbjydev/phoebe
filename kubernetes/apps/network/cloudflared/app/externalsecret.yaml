---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflared
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: cloudflared-secret
    template:
      data:
        TUNNEL_TOKEN: |-
          {{ toJson (dict "a" .accountTag "t" .tunnelId "s" .tunnelSecret) | base64 }}
  dataFrom:
    - extract:
        key: app-cloudflared
