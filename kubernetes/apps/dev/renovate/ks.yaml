---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &name renovate-operator
  namespace: &namespace dev
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *name
  components:
    - ../../../../components/redis
    - ../../../../components/kanidm/private
  interval: 1h
  path: ./kubernetes/apps/dev/renovate/operator
  postBuild:
    substitute:
      APP: *name
      NAMESPACE: *namespace

      OIDC_DISPLAY_NAME: Renovate
      OIDC_ORIGIN: https://renovate.hayden.moe/
      OIDC_REDIRECT_URLS: '["https://renovate.hayden.moe/auth/callback"]'
      OIDC_GROUP_PREFIX: renovate
      OIDC_USERS_GROUP_MEMBERS: '[hayden]'
      OIDC_ADMIN_GROUP_MEMBERS: '[hayden]'
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  timeout: 5m
  wait: false
  targetNamespace: *namespace

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &name renovate-jobs
  namespace: &namespace dev
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *name
  interval: 1h
  path: ./kubernetes/apps/dev/renovate/jobs
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  timeout: 5m
  wait: false
  targetNamespace: *namespace
