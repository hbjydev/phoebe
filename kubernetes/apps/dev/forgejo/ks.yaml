---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &name forgejo
  namespace: &namespace dev
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *name
  components:
    - ../../../../components/postgres/cert
    - ../../../../components/kanidm/private
    - ../../../../components/anubis
    - ../../../../components/redis
    - ../../../../components/kopiur
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: "./kubernetes/apps/dev/forgejo/app"
  postBuild:
    substitute:
      APP: *name
      NAMESPACE: *namespace

      APP_UID: "1000"
      APP_GID: "1000"
      KOPIUR_CAPACITY: 50Gi

      ANUBIS_TARGET: http://forgejo-http.dev.svc.cluster.local:3000
      ANUBIS_MEM_LIMIT: 384Mi

      OIDC_DISPLAY_NAME: Forgejo
      OIDC_ORIGIN: https://forgejo.hayden.moe/
      OIDC_REDIRECT_URLS: '["https://forgejo.hayden.moe/user/oauth2/kanidm/callback"]'
      OIDC_SECRET_KEY_ALIASES: '{clientId: [key], clientSecret: [secret]}'
      OIDC_USERS_GROUP_MEMBERS: '[hayden]'
      OIDC_ADMIN_GROUP_MEMBERS: '[hayden]'
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  timeout: 5m
  wait: false

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: forgejo-runner
  namespace: &namespace dev
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: forgejo
  interval: 1h
  path: ./kubernetes/apps/dev/forgejo/runner
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  timeout: 5m
  wait: false
  targetNamespace: *namespace
