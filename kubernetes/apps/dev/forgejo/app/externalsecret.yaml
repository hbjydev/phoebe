---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-signing-key
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: forgejo-signing-key
    creationPolicy: Owner
    template:
      data:
        ed25519: "{{ .signingPrivKeyB64 | b64dec }}"
        ed25519.pub: "{{ .signingPubKeyB64 | b64dec }}"
  dataFrom:
    - extract:
        key: app-forgejo

---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-kanidm-oidc
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: forgejo-kanidm-oidc
    creationPolicy: Owner
    template:
      data:
        key: "{{ .clientId }}"
        secret: "{{ .clientSecret }}"
  dataFrom:
    - extract:
        key: app-forgejo
