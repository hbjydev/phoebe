---
apiVersion: kaniop.rs/v1beta1
kind: KanidmOAuth2Client
metadata:
  name: forgejo
spec:
  displayname: Forgejo
  image:
    url: https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/forgejo.svg
  kanidmRef:
    name: kanidm
    namespace: security
  origin: https://forgejo.hayden.moe/
  redirectUrl:
    - https://forgejo.hayden.moe/user/oauth2/kanidm/callback
  scopeMap:
    - group: forgejo
      scopes:
        - openid
        - profile
        - email
        - groups

---
apiVersion: kaniop.rs/v1beta1
kind: KanidmGroup
metadata:
  name: forgejo-users
spec:
  kanidmRef:
    name: kanidm
    namespace: security
  kanidmName: forgejo_users
  accountPolicy:
    authSessionExpiry: 2678400
  members:
    - hayden

---
apiVersion: kaniop.rs/v1beta1
kind: KanidmGroup
metadata:
  name: forgejo-admins
spec:
  kanidmRef:
    name: kanidm
    namespace: security
  kanidmName: forgejo_admins
  accountPolicy:
    authSessionExpiry: 2678400
  members:
    - hayden
